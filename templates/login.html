<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIVEFLOW PRO · Acceso</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#38bdf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="DriveFlow">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0}
        body{background:#0a0f1e;color:#f1f5f9;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.04) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
        .card{background:#0f172a;border:1px solid #1e3a5f;border-radius:20px;padding:48px 40px;width:min(420px,100%);box-shadow:0 25px 60px rgba(0,0,0,.7);position:relative;animation:up .4s ease}
        @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#38bdf8,#6366f1,#38bdf8);background-size:200% auto;border-radius:20px 20px 0 0;animation:sh 3s linear infinite}
        @keyframes sh{to{background-position:200% center}}
        .logo{font-family:'Rajdhani',sans-serif;font-size:2.6rem;font-weight:700;letter-spacing:3px;text-align:center;margin-bottom:4px}
        .logo span{color:#38bdf8}
        .sub{text-align:center;color:#94a3b8;font-size:.82em;margin-bottom:36px}
        .flash{padding:10px 14px;border-radius:8px;font-size:.85em;font-weight:600;margin-bottom:18px;text-align:center}
        .flash.success{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
        .flash.danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
        .flash.info{background:rgba(56,189,248,.15);color:#38bdf8;border:1px solid rgba(56,189,248,.3)}
        .grupo{margin-bottom:18px}
        label{display:block;font-size:.75em;font-weight:600;color:#94a3b8;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
        input{width:100%;background:#1e293b;color:#f1f5f9;border:1px solid #1e3a5f;padding:12px 16px;border-radius:10px;font-family:inherit;font-size:.95em;outline:none;transition:.2s}
        input:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.15)}
        input::placeholder{color:#94a3b8;opacity:.5}
        .btn{width:100%;padding:13px;background:#38bdf8;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:.95em;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:.2s;box-shadow:0 4px 20px rgba(56,189,248,.35);margin-top:8px}
        .btn:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 28px rgba(56,189,248,.45)}
        .btn:active{transform:scale(.98)}
        .hint{text-align:center;margin-top:20px;font-size:.75em;color:#64748b}
        .hint code{background:#1e293b;padding:2px 7px;border-radius:4px;color:#38bdf8}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">DRIVE<span>FLOW</span></div>
    <p class="sub">Panel de Control · Inventario Inteligente</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST" action="/login">
        <div class="grupo">
            <label>Usuario</label>
            <input type="text" name="username" placeholder="Ingresa tu usuario" autofocus required>
        </div>
        <div class="grupo">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">INGRESAR →</button>
    </form>
    <p class="hint">Credenciales por defecto: <code>admin</code> / <code>admin123</code></p>
</div>
</body>
</html>
